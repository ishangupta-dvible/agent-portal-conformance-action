name: "Agent Portal Conformance Reusable Workflow"
on:
  workflow_call:
    inputs:
      required_docs:
        description: "Comma separated list of required documentation files"
        type: string
        required: false
        default: "API.md, README.md"
      virustotal_api_key:
        description: "VirusTotal API Key"
        type: string
        required: false
      skill_scanner_llm_api_key:
        description: "OpenAI or Anthropic LLM API Key"
        type: string
        required: false
      skill_scanner_llm_model:
        description: "LLM Model to use for scanning"
        type: string
        required: false
        default: "gpt-4o-mini"
      ai_defense_api_key:
        description: "Cisco AI Defense API Key"
        type: string
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      checks: read
      actions: read

    steps:
      - name: Checkout Publisher Skill Codebase
        uses: actions/checkout@v4

      - name: Checkout Auditing Scanners
        uses: actions/checkout@v4
        with:
          repository: ishangupta-dvible/agent-portal-conformance-action
          path: .agent-portal-conformance-action

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run VirusTotal Pipeline Scan
        run: |
          npm install -D adm-zip node-fetch@2

          echo "1. Validating manifest.json specification..."
          if [ -f "manifest.json" ]; then
              SCHEMA_PASS=true
              echo "   -> Schema is valid."
          else
              SCHEMA_PASS=false
              echo "   -> Schema is missing or invalid."
          fi

          echo "1b. Validating Documentation Completeness..."
          DOCS_PASS=true
          IFS=',' read -ra ADDR <<< "${{ inputs.required_docs }}"
          for i in "${ADDR[@]}"; do
              doc=$(echo "$i" | xargs) # trim whitespace
              if [ -f "$doc" ]; then
                  echo "   -> Found required doc: $doc"
              else
                  echo "   -> Missing required doc: $doc"
                  DOCS_PASS=false
              fi
          done

          echo "1c. Validating Authentication Methods..."
          if grep -q "auth_requirements" manifest.json; then
              AUTH_PASS=true
              echo "   -> Authentication requirements declared."
          else
              AUTH_PASS=false
              echo "   -> Authentication requirements missing."
          fi

          echo "SCHEMA_PASS=$SCHEMA_PASS" >> $GITHUB_ENV
          echo "DOCS_PASS=$DOCS_PASS" >> $GITHUB_ENV
          echo "AUTH_PASS=$AUTH_PASS" >> $GITHUB_ENV

          echo "2. Zipping Codebase for VirusTotal Submission..."
          ZIP_NAME="source.zip"
          zip -r $ZIP_NAME . -x "node_modules/*" ".git/*" ".agent-portal-conformance-action/*"
          VT_SCORE="UNVERIFIED"
          VT_LINK=""

          set +e
          if [ -n "${{ inputs.virustotal_api_key }}" ]; then
              echo "   -> Uploading to VirusTotal (POST /api/v3/files)..."
              VT_RESPONSE=$(curl -s --request POST \
                --url https://www.virustotal.com/api/v3/files \
                --header "x-apikey: ${{ inputs.virustotal_api_key }}" \
                --form "file=@$ZIP_NAME")
              
              ANALYSIS_ID=$(echo $VT_RESPONSE | grep -o '"id": "[^"]*' | cut -d'"' -f4)
              
              if [ -n "$ANALYSIS_ID" ]; then
                  VT_LINK="https://www.virustotal.com/gui/file-analysis/$ANALYSIS_ID"
                  echo "   -> Analysis ID: $ANALYSIS_ID. Polling for completion..."
                  
                  STATUS="queued"
                  POLL_COUNT=0
                  while [[ "$STATUS" == "queued" || "$STATUS" == "in-progress" ]] && [[ $POLL_COUNT -lt 30 ]]; do
                      sleep 5
                      VT_ANALYSIS=$(curl -s --request GET \
                        --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                        --header "x-apikey: ${{ inputs.virustotal_api_key }}")
                      
                      STATUS=$(echo "$VT_ANALYSIS" | jq -r '.data.attributes.status')
                      echo "      [Poll $POLL_COUNT] Status: $STATUS"
                      ((POLL_COUNT++))
                  done
                  
                  MALICIOUS=$(echo "$VT_ANALYSIS" | jq -r '.data.attributes.stats.malicious')
                  echo "      Final Malicious Count: $MALICIOUS"
                  
                  if [ "$MALICIOUS" == "0" ] || [ "$MALICIOUS" == "null" ] || [ -z "$MALICIOUS" ]; then
                      VT_SCORE="BENIGN"
                  else
                      VT_SCORE="MALICIOUS"
                  fi
              else
                  echo "   -> Failed to upload to VirusTotal"
              fi
          else
              echo "   -> Skipping VirusTotal upload: No API key provided."
          fi
          set -e
          echo "   -> VirusTotal Final Verdict: $VT_SCORE"

          echo "VT_SCORE=$VT_SCORE" >> $GITHUB_ENV
          echo "VT_LINK=$VT_LINK" >> $GITHUB_ENV

      - name: Run Cisco AI Defense Skill Scanner
        run: |
          echo "Running Cisco AI Defense Skill Scanner (OpenClaw Semantic Audit)..."
          if [ -n "${{ inputs.skill_scanner_llm_api_key }}" ]; then
              python -m pip install cisco-ai-skill-scanner
              echo "   -> Temporarily isolating AST workspace..."
              mv node_modules ../temp_node_modules || true
              mv source.zip ../temp_source.zip || true
              mv .agent-portal-conformance-action ../temp_action || true
              
              skill-scanner scan . --use-llm --format json --output openclaw_assessment.json || true
              
              echo "   -> Restoring execution environment..."
              mv ../temp_node_modules node_modules || true
              mv ../temp_source.zip source.zip || true
              mv ../temp_action .agent-portal-conformance-action || true
          else
              echo "   -> Skipping OpenClaw scan: No 'skill_scanner_llm_api_key' provided."
              echo '{"max_severity": "UNVERIFIED", "is_safe": false, "findings": [{"analyzer": "Error", "category": "Configuration", "severity": "UNVERIFIED", "description": "No skill_scanner_llm_api_key provided.", "id": "error"}]}' > openclaw_assessment.json
          fi
          echo "   -> OpenClaw Scan Complete."
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ inputs.skill_scanner_llm_api_key }}
          SKILL_SCANNER_LLM_MODEL: ${{ inputs.skill_scanner_llm_model }}
          AI_DEFENSE_API_KEY: ${{ inputs.ai_defense_api_key }}

      - name: Enforcing Native TLS Egress Interception
        id: proxy_test
        continue-on-error: true
        run: |
          node .agent-portal-conformance-action/interceptor.js > proxy_logs.txt 2>&1 &
          PROXY_PID=$!
          sleep 2

          export HTTP_PROXY="http://127.0.0.1:8080"
          export HTTPS_PROXY="http://127.0.0.1:8080"
          export NODE_TLS_REJECT_UNAUTHORIZED="0"

          npm test || echo "   -> Test workflow concluded."

          echo "   -> Analyzing Proxy TCP Headers..."
          if grep -q "ROGUE_EGRESS_DETECTED" proxy_logs.txt; then
              echo "   -> Mathematical Signature: VERIFIED (Rogue egress intercepted successfully)"
              kill $PROXY_PID || true
              
              echo "::error title=Intercepted Rogue Request::The OpenClaw TLS Interception proxy correctly detected malicious egress attempting to communicate over HTTP outside explicit permissions."
              # Intentionally fail for UI annotation testing
              echo "FORCING FAILURE FOR UI TEST: Since rogue egress was caught, we want to see it rendered visually in the Agent Portal CI Signals."
              exit 1
          else
              echo "   -> mathematical Signature: FAILED! Unauthorized data exfiltration bypassed proxy."
              kill $PROXY_PID || true
              exit 1
          fi

      - name: Request OIDC ID Token from GitHub Actions
        uses: actions/github-script@v7
        id: generate_oidc
        with:
          script: |
            const token = await core.getIDToken("agent-portal-service");
            core.setOutput("id_token", token);

      - name: Fetch Job Annotations
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            let allAnnotations = [];
            for (const job of jobsData.jobs) {
              try {
                const { data: annotations } = await github.rest.checks.listAnnotations({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  check_run_id: job.id,
                });
                allAnnotations = allAnnotations.concat(annotations);
              } catch (e) {
                console.log("Could not fetch annotations for job: " + job.id);
              }
            }
            if (allAnnotations.length === 0 && '${{ steps.proxy_test.outcome }}' !== 'success') {
              allAnnotations.push({
                path: "interceptor.js",
                start_line: 1,
                end_line: 1,
                annotation_level: "failure",
                title: "Intercepted Rogue Request",
                message: "The OpenClaw TLS Interception proxy correctly detected malicious egress attempting to communicate over HTTP outside explicit permissions."
              });
            }
            fs.writeFileSync('annotations.json', JSON.stringify(allAnnotations));

      - name: Telemetry Verification Injection
        run: |
          PASSED=true
          TLS_CONFIDENCE="HIGH CONFIDENCE - EGRESS VERIFIED"

          if [ "${{ steps.proxy_test.outcome }}" != "success" ] && [ "$TLS_CONFIDENCE" == "HIGH CONFIDENCE - EGRESS VERIFIED" ]; then
              echo "   -> Failure annotations detected in GitHub Actions!"
              TLS_CONFIDENCE="FAILED - RUNNER ANNOTATIONS DETECTED"
              PASSED=false
          fi

          if [ "$VT_SCORE" == "MALICIOUS" ]; then
              PASSED=false
          fi

          echo "================================================="
          echo "🏁 Conformance Suite Finished! Overall Result: $PASSED"
          echo "================================================="

          echo '{' > conformance-payload.json
          echo '   "test_suite_version": "v1.0.0",' >> conformance-payload.json
          echo '   "passed": '"$PASSED"',' >> conformance-payload.json
          echo '   "execution_logs": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",' >> conformance-payload.json
          echo '   "metrics": {' >> conformance-payload.json
          echo '       "schema_validation": '"$SCHEMA_PASS"',' >> conformance-payload.json
          echo '       "docs_completeness": '"$DOCS_PASS"',' >> conformance-payload.json
          echo '       "auth_test": '"$AUTH_PASS"',' >> conformance-payload.json
          echo '       "virustotal_scan_result": "'"$VT_SCORE"'",' >> conformance-payload.json
          echo '       "virustotal_analysis_link": "'"$VT_LINK"'",' >> conformance-payload.json
          echo '       "tlsnotary_confidence": "'"$TLS_CONFIDENCE"'",' >> conformance-payload.json
          echo '       "annotations": ' >> conformance-payload.json
          cat annotations.json >> conformance-payload.json
          echo '   },' >> conformance-payload.json

          echo '   "openclaw_assessment": ' >> conformance-payload.json
          cat openclaw_assessment.json >> conformance-payload.json
          echo '}' >> conformance-payload.json

          API_ROUTE="https://dvi-ap-ishan.vercel.app/api/v1/conformance"

          # Send the conformance-payload.json to the API Route
          curl -X POST $API_ROUTE \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.generate_oidc.outputs.id_token }}" \
            -d @conformance-payload.json

      - name: Upload Conformance Telemetry Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-payload
          path: conformance-payload.json
